<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAHIBA Commerce</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn .3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script id="app-source" type="text/plain">
    const { useState, useEffect, useCallback } = React;

    const API = '/api/ml-api';

    function api(path, opts = {}) {
      return fetch(`${API}${path}`, {
        ...opts,
        headers: { 'Content-Type': 'application/json', ...opts.headers },
      }).then(r => r.json());
    }

    // ─── Formatters ───
    const fmtMXN = n => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(n || 0);
    const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
    const fmtTime = d => d ? new Date(d).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';
    const ago = d => {
      if (!d) return 'never';
      const m = Math.floor((Date.now() - new Date(d)) / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return `${m}m ago`;
      if (m < 1440) return `${Math.floor(m/60)}h ago`;
      return `${Math.floor(m/1440)}d ago`;
    };

    // ─── KPI Card ───
    function KpiCard({ label, value, sub, color = 'blue' }) {
      const colors = {
        blue: 'from-blue-600/20 to-blue-800/10 border-blue-500/30',
        green: 'from-green-600/20 to-green-800/10 border-green-500/30',
        amber: 'from-amber-600/20 to-amber-800/10 border-amber-500/30',
        purple: 'from-purple-600/20 to-purple-800/10 border-purple-500/30',
      };
      return (
        <div className={`bg-gradient-to-br ${colors[color]} border rounded-xl p-5`}>
          <div className="text-sm text-slate-400 mb-1">{label}</div>
          <div className="text-2xl font-bold text-white">{value}</div>
          {sub && <div className="text-xs text-slate-500 mt-1">{sub}</div>}
        </div>
      );
    }

    // ─── Mini bar chart ───
    function BarChart({ data, labelKey, valueKey, formatValue }) {
      if (!data?.length) return <div className="text-slate-500 text-sm py-8 text-center">No data yet</div>;
      const max = Math.max(...data.map(d => Number(d[valueKey]) || 0));
      return (
        <div className="space-y-2">
          {data.map((d, i) => (
            <div key={i} className="flex items-center gap-3 text-sm">
              <span className="w-24 truncate text-slate-400">{d[labelKey]}</span>
              <div className="flex-1 bg-slate-800 rounded-full h-5 overflow-hidden">
                <div
                  className="bg-blue-500 h-full rounded-full transition-all"
                  style={{ width: `${max ? (Number(d[valueKey]) / max) * 100 : 0}%` }}
                />
              </div>
              <span className="w-20 text-right text-slate-300">{formatValue ? formatValue(d[valueKey]) : d[valueKey]}</span>
            </div>
          ))}
        </div>
      );
    }

    // ─── Status badge ───
    function Badge({ text, variant = 'default' }) {
      const styles = {
        paid: 'bg-green-500/20 text-green-400',
        shipped: 'bg-blue-500/20 text-blue-400',
        delivered: 'bg-emerald-500/20 text-emerald-400',
        cancelled: 'bg-red-500/20 text-red-400',
        active: 'bg-green-500/20 text-green-400',
        paused: 'bg-amber-500/20 text-amber-400',
        closed: 'bg-slate-500/20 text-slate-400',
        default: 'bg-slate-600/20 text-slate-400',
      };
      const key = (text || '').toLowerCase();
      const cls = styles[key] || styles.default;
      return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${cls}`}>{text || '—'}</span>;
    }

    // ─── Sync button ───
    function SyncButton({ onClick, loading, label }) {
      return (
        <button
          onClick={onClick}
          disabled={loading}
          className="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-700 text-white text-sm rounded-lg transition"
        >
          {loading && <svg className="w-4 h-4 spinner" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeDasharray="30 70" /></svg>}
          {label}
        </button>
      );
    }

    // ─── Dashboard View ───
    function DashboardView() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);

      const load = useCallback(() => {
        setLoading(true);
        api('/dashboard').then(setData).finally(() => setLoading(false));
      }, []);

      useEffect(() => { load(); }, [load]);

      if (loading && !data) return <Loader />;

      return (
        <div className="space-y-6 fade-in">
          <div className="flex items-center justify-between">
            <h2 className="text-xl font-bold">Dashboard</h2>
            <div className="text-xs text-slate-500">
              Products synced {ago(data?.last_products_sync)} &middot; Orders synced {ago(data?.last_orders_sync)}
            </div>
          </div>
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <KpiCard label="Active Products" value={data?.active_products || 0} color="blue" />
            <KpiCard label="Orders (30d)" value={data?.orders_30d || 0} color="green" />
            <KpiCard label="Revenue (30d)" value={fmtMXN(data?.revenue_30d)} color="amber" />
            <KpiCard label="Avg Order" value={fmtMXN(data?.avg_order)} color="purple" />
          </div>

          <div className="grid lg:grid-cols-2 gap-6">
            <div className="bg-slate-800/50 rounded-xl p-5 border border-slate-700/50">
              <h3 className="text-sm font-semibold text-slate-300 mb-4">Daily Revenue (30d)</h3>
              <BarChart data={data?.daily} labelKey="day" valueKey="revenue" formatValue={fmtMXN} />
            </div>
            <div className="bg-slate-800/50 rounded-xl p-5 border border-slate-700/50">
              <h3 className="text-sm font-semibold text-slate-300 mb-4">Top Products by Units</h3>
              <BarChart data={data?.top_products} labelKey="title" valueKey="units" />
            </div>
          </div>

          {data?.low_stock?.length > 0 && (
            <div className="bg-amber-900/20 border border-amber-500/30 rounded-xl p-5">
              <h3 className="text-sm font-semibold text-amber-400 mb-3">Low Stock Alert ({data.low_stock.length})</h3>
              <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-2">
                {data.low_stock.map(p => (
                  <div key={p.external_id} className="flex justify-between text-sm bg-slate-800/50 rounded-lg px-3 py-2">
                    <span className="truncate text-slate-300">{p.title}</span>
                    <span className="text-amber-400 font-mono ml-2">{p.stock}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── Products View ───
    function ProductsView() {
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [syncing, setSyncing] = useState(false);
      const [search, setSearch] = useState('');

      useEffect(() => {
        api('/products').then(d => setProducts(d.products || [])).finally(() => setLoading(false));
      }, []);

      const sync = () => {
        setSyncing(true);
        api('/sync-products', { method: 'POST' })
          .then(() => api('/products'))
          .then(d => setProducts(d.products || []))
          .finally(() => setSyncing(false));
      };

      const filtered = products.filter(p =>
        !search || p.title?.toLowerCase().includes(search.toLowerCase()) ||
        p.external_id?.toLowerCase().includes(search.toLowerCase())
      );

      if (loading) return <Loader />;

      return (
        <div className="space-y-4 fade-in">
          <div className="flex flex-wrap items-center justify-between gap-3">
            <h2 className="text-xl font-bold">Products ({products.length})</h2>
            <div className="flex gap-3">
              <input
                type="text"
                placeholder="Search..."
                value={search}
                onChange={e => setSearch(e.target.value)}
                className="px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm focus:outline-none focus:border-blue-500"
              />
              <SyncButton onClick={sync} loading={syncing} label="Sync from ML" />
            </div>
          </div>
          {filtered.length === 0 ? (
            <Empty msg={products.length ? 'No matches' : 'No products synced yet. Click "Sync from ML" to pull your listings.'} />
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="text-left text-slate-400 border-b border-slate-700/50">
                    <th className="py-3 px-3">Image</th>
                    <th className="py-3 px-3">ID</th>
                    <th className="py-3 px-3">Title</th>
                    <th className="py-3 px-3 text-right">Price</th>
                    <th className="py-3 px-3 text-right">Stock</th>
                    <th className="py-3 px-3">Status</th>
                    <th className="py-3 px-3">Type</th>
                    <th className="py-3 px-3">Link</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(p => (
                    <tr key={p.id} className="border-b border-slate-800/50 hover:bg-slate-800/30">
                      <td className="py-2 px-3">
                        {p.thumbnail ? <img src={p.thumbnail} className="w-10 h-10 rounded object-cover" /> : <div className="w-10 h-10 bg-slate-700 rounded" />}
                      </td>
                      <td className="py-2 px-3 font-mono text-xs text-slate-500">{p.external_id}</td>
                      <td className="py-2 px-3 max-w-xs truncate">{p.title}</td>
                      <td className="py-2 px-3 text-right">{fmtMXN(p.price)}</td>
                      <td className={`py-2 px-3 text-right font-mono ${p.stock <= 3 ? 'text-amber-400' : ''}`}>{p.stock}</td>
                      <td className="py-2 px-3"><Badge text={p.status} /></td>
                      <td className="py-2 px-3 text-xs text-slate-500">{p.listing_type}</td>
                      <td className="py-2 px-3">
                        {p.permalink && <a href={p.permalink} target="_blank" rel="noopener" className="text-blue-400 hover:underline text-xs">View</a>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    // ─── Orders View ───
    function OrdersView() {
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);
      const [syncing, setSyncing] = useState(false);
      const [filter, setFilter] = useState('all');

      useEffect(() => {
        api('/orders').then(d => setOrders(d.orders || [])).finally(() => setLoading(false));
      }, []);

      const sync = () => {
        setSyncing(true);
        api('/sync-orders', { method: 'POST' })
          .then(() => api('/orders'))
          .then(d => setOrders(d.orders || []))
          .finally(() => setSyncing(false));
      };

      const filtered = orders.filter(o => filter === 'all' || o.status === filter);
      const statuses = ['all', ...new Set(orders.map(o => o.status).filter(Boolean))];

      if (loading) return <Loader />;

      return (
        <div className="space-y-4 fade-in">
          <div className="flex flex-wrap items-center justify-between gap-3">
            <h2 className="text-xl font-bold">Orders ({orders.length})</h2>
            <div className="flex gap-3">
              <select
                value={filter}
                onChange={e => setFilter(e.target.value)}
                className="px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm"
              >
                {statuses.map(s => <option key={s} value={s}>{s === 'all' ? 'All statuses' : s}</option>)}
              </select>
              <SyncButton onClick={sync} loading={syncing} label="Sync from ML" />
            </div>
          </div>
          {filtered.length === 0 ? (
            <Empty msg={orders.length ? 'No orders match filter' : 'No orders synced yet. Click "Sync from ML" to pull your sales.'} />
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="text-left text-slate-400 border-b border-slate-700/50">
                    <th className="py-3 px-3">Order ID</th>
                    <th className="py-3 px-3">Buyer</th>
                    <th className="py-3 px-3">Items</th>
                    <th className="py-3 px-3 text-right">Total</th>
                    <th className="py-3 px-3">Status</th>
                    <th className="py-3 px-3">Date</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(o => {
                    let items = [];
                    try { items = typeof o.items_json === 'string' ? JSON.parse(o.items_json) : (o.items_json || []); } catch {}
                    return (
                      <tr key={o.id} className="border-b border-slate-800/50 hover:bg-slate-800/30">
                        <td className="py-2 px-3 font-mono text-xs text-slate-500">{o.external_id}</td>
                        <td className="py-2 px-3">{o.buyer_nickname || '—'}</td>
                        <td className="py-2 px-3 max-w-xs">
                          {items.map((it, j) => (
                            <div key={j} className="truncate text-xs text-slate-400">
                              {it.qty}x {it.title}
                            </div>
                          ))}
                        </td>
                        <td className="py-2 px-3 text-right font-medium">{fmtMXN(o.total)}</td>
                        <td className="py-2 px-3"><Badge text={o.status} /></td>
                        <td className="py-2 px-3 text-slate-400 text-xs">{fmtTime(o.date_created)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    // ─── Settings View ───
    function SettingsView() {
      const [status, setStatus] = useState(null);
      const [loading, setLoading] = useState(true);
      const [initResult, setInitResult] = useState(null);
      const [initing, setIniting] = useState(false);

      useEffect(() => {
        api('/status').then(setStatus).finally(() => setLoading(false));
      }, []);

      const initDb = () => {
        setIniting(true);
        fetch('/api/db-init', { method: 'POST' })
          .then(r => r.json())
          .then(setInitResult)
          .finally(() => setIniting(false));
      };

      if (loading) return <Loader />;

      return (
        <div className="space-y-6 fade-in max-w-2xl">
          <h2 className="text-xl font-bold">Settings</h2>

          <div className="bg-slate-800/50 rounded-xl p-6 border border-slate-700/50 space-y-4">
            <h3 className="font-semibold">Database</h3>
            <div className="flex gap-3 items-center">
              <SyncButton onClick={initDb} loading={initing} label="Initialize Tables" />
              {initResult && (
                <span className="text-sm text-green-400">
                  {initResult.success ? `${initResult.tables} tables created` : `Error: ${initResult.error}`}
                </span>
              )}
            </div>
          </div>

          <div className="bg-slate-800/50 rounded-xl p-6 border border-slate-700/50 space-y-4">
            <h3 className="font-semibold">Mercado Libre Connection</h3>
            {status?.connected ? (
              <div className="space-y-2">
                <div className="flex items-center gap-2">
                  <div className="w-2 h-2 rounded-full bg-green-500"></div>
                  <span className="text-green-400 text-sm">Connected</span>
                </div>
                <div className="text-sm text-slate-400 space-y-1">
                  <div>User ID: <span className="font-mono text-slate-300">{status.user_id}</span></div>
                  <div>Token expires: <span className="text-slate-300">{fmtTime(status.expires_at)}</span></div>
                  <div>Token valid: <span className={status.token_valid ? 'text-green-400' : 'text-red-400'}>{status.token_valid ? 'Yes' : 'Expired'}</span></div>
                  <div>Scopes: <span className="text-slate-300 text-xs">{status.scope}</span></div>
                </div>
              </div>
            ) : (
              <div className="space-y-3">
                <p className="text-sm text-slate-400">Connect your Mercado Libre seller account to sync products and orders.</p>
                <a
                  href="/.netlify/functions/ml-oauth-start"
                  className="inline-block px-6 py-3 bg-yellow-500 hover:bg-yellow-400 text-black font-semibold rounded-lg transition"
                >
                  Connect Mercado Libre
                </a>
              </div>
            )}
          </div>

          <div className="bg-slate-800/50 rounded-xl p-6 border border-slate-700/50 space-y-2">
            <h3 className="font-semibold">TikTok Shop</h3>
            <div className="flex items-center gap-2">
              <div className="w-2 h-2 rounded-full bg-slate-500"></div>
              <span className="text-slate-500 text-sm">Pending app approval</span>
            </div>
          </div>

          <div className="bg-slate-800/50 rounded-xl p-6 border border-slate-700/50 space-y-2">
            <h3 className="font-semibold">Meta Catalog</h3>
            <div className="flex items-center gap-2">
              <div className="w-2 h-2 rounded-full bg-slate-500"></div>
              <span className="text-slate-500 text-sm">Catalog sync — Phase 6</span>
            </div>
          </div>
        </div>
      );
    }

    // ─── Loader / Empty ───
    function Loader() {
      return (
        <div className="flex justify-center py-20">
          <svg className="w-8 h-8 text-blue-500 spinner" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeDasharray="30 70" />
          </svg>
        </div>
      );
    }
    function Empty({ msg }) {
      return <div className="text-slate-500 text-sm text-center py-12 bg-slate-800/30 rounded-xl">{msg}</div>;
    }

    // ─── Nav ───
    const TABS = [
      { id: 'dashboard', label: 'Dashboard', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4' },
      { id: 'products',  label: 'Products',  icon: 'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4' },
      { id: 'orders',    label: 'Orders',    icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2' },
      { id: 'settings',  label: 'Settings',  icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z' },
    ];

    function App() {
      const [tab, setTab] = useState('dashboard');
      const params = new URLSearchParams(window.location.search);
      const connected = params.get('connected');

      useEffect(() => {
        if (connected) {
          setTab('settings');
          window.history.replaceState({}, '', '/');
        }
      }, [connected]);

      return (
        <div className="min-h-screen flex">
          {/* Sidebar */}
          <nav className="w-56 bg-slate-900 border-r border-slate-800 flex flex-col p-4">
            <div className="flex items-center gap-2 mb-8 px-2">
              <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-yellow-400 to-amber-600 flex items-center justify-center font-bold text-black text-sm">S</div>
              <div>
                <div className="font-bold text-sm">SAHIBA</div>
                <div className="text-xs text-slate-500">Commerce</div>
              </div>
            </div>
            <div className="space-y-1">
              {TABS.map(t => (
                <button
                  key={t.id}
                  onClick={() => setTab(t.id)}
                  className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition ${
                    tab === t.id
                      ? 'bg-blue-600/20 text-blue-400 font-medium'
                      : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'
                  }`}
                >
                  <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d={t.icon} />
                  </svg>
                  {t.label}
                </button>
              ))}
            </div>
            <div className="mt-auto pt-4 border-t border-slate-800 text-xs text-slate-600 px-2">
              <div>Mercado Libre</div>
              <div className="text-slate-700 mt-1">TikTok &middot; Meta &middot; soon</div>
            </div>
          </nav>

          {/* Main content */}
          <main className="flex-1 p-6 lg:p-8 overflow-auto">
            {tab === 'dashboard' && <DashboardView />}
            {tab === 'products' && <ProductsView />}
            {tab === 'orders' && <OrdersView />}
            {tab === 'settings' && <SettingsView />}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script>
    (function() {
      var src = document.getElementById('app-source').textContent;
      var compiled = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
      new Function(compiled)();
    })();
  </script>
</body>
</html>
